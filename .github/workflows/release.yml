name: Release

# Builds SnipVault installers for Windows and macOS and attaches them to a
# GitHub Release. Runs when a version tag (e.g. v1.1.0) is pushed, or manually
# from the Actions tab.
#
# Structure: a single draft release is created up front (create-release), the
# platform matrix uploads its bundles to that same release so the updater
# `latest.json` merges correctly across platforms (build), and a final job
# un-drafts it (publish). Creating the release first avoids the tauri-action
# race where each parallel matrix job would otherwise spawn its own draft with
# an incomplete latest.json.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const version = process.env.APP_VERSION;
            // SnipVault isn't signed with a paid Apple Developer certificate, so
            // macOS Gatekeeper flags the downloaded app as "damaged". Ship the
            // one-time un-quarantine steps in every release body so mac users can
            // actually open it. (Built as a joined array to avoid clashing with
            // the workflow's own backtick/template syntax.)
            const body = [
              'See the assets below to download and install this version.',
              '',
              '### 🍎 macOS: “SnipVault is damaged and can’t be opened”',
              '',
              'SnipVault is not signed with a paid Apple Developer certificate, so macOS Gatekeeper blocks it on first launch. The app is safe — this warning is expected for open-source apps distributed outside the App Store. To open it:',
              '',
              '1. Open the `.dmg` and drag **SnipVault.app** into your **Applications** folder.',
              '2. Open **Terminal** and run:',
              '',
              '   ```',
              '   xattr -dr com.apple.quarantine /Applications/SnipVault.app',
              '   ```',
              '',
              '3. Launch SnipVault from Applications as normal.',
              '',
              'You only need to do this once per install. Choose the **aarch64** `.dmg` for Apple Silicon (M1–M4) Macs, or the **x64** `.dmg` for Intel Macs.',
            ].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `SnipVault v${version}`,
              body,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS runners build both architectures; Windows uses its default host target.
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. The private key + password are stored as repo secrets;
          # they sign the update artifacts so the in-app updater will accept them.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload to the single draft release created above so every platform's
          # bundle lands on the same release and latest.json merges correctly.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              make_latest: 'true',
            });
